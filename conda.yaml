# RCC builds this conda environment; all Python deps are installed here so the
# task shell can run `python -m robocorp.tasks run tasks.py` directly without uv.
# https://github.com/robocorp/rcc/blob/master/docs/recipes.md#what-is-in-condayaml

channels:
  - conda-forge

dependencies:
  - python=3.12.13
  - pip=24.0
  - pip:
    - chardet>=3.0.2,<6
    - playwright>=1.58.0
    - python-dotenv>=1.0.0
    - robocorp>=3.1.1
    - robocorp-browser>=2.0.0
    - rpaframework>=31.2.0

postInstall:
  - playwright install chromium
