name: Deploy to Robocorp

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rcc
        run: |
          curl -fsSL -o rcc https://downloads.robocorp.com/rcc/releases/v21.2.0/linux64/rcc
          chmod +x rcc

      - name: Deploy to Control Room
        run: ./rcc cloud push --account "${{ secrets.ROBOCORP_CREDENTIALS }}" --workspace "${{ secrets.ROBOCORP_WORKSPACE_ID }}" --robot "${{ secrets.ROBOCORP_ROBOT_ID }}"
